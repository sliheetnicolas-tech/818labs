<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
<defs>
  <radialGradient id="rbgrad140" cx="50%" cy="45%" r="65%">
    <stop offset="0%" stop-color="#141e30"/>
    <stop offset="100%" stop-color="#0a0f1a"/>
  </radialGradient>
  <linearGradient id="botrad140" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#1a1a1a"/>
    <stop offset="20%" stop-color="#333"/>
    <stop offset="40%" stop-color="#3a3a3a"/>
    <stop offset="60%" stop-color="#333"/>
    <stop offset="80%" stop-color="#2a2a2a"/>
    <stop offset="100%" stop-color="#1a1a1a"/>
  </linearGradient>
  <linearGradient id="bcaprad140" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#444"/>
    <stop offset="40%" stop-color="#2a2a2a"/>
    <stop offset="100%" stop-color="#1a1a1a"/>
  </linearGradient>
  <linearGradient id="blblrad140" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fcfcfc"/>
    <stop offset="100%" stop-color="#f0f0f0"/>
  </linearGradient>
  <linearGradient id="bshinerad140" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="white" stop-opacity="0"/>
    <stop offset="15%" stop-color="white" stop-opacity="0.12"/>
    <stop offset="25%" stop-color="white" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </linearGradient>
  <filter id="bshadowrad140">
    <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
    <feOffset dy="8"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="bishadowrad140">
    <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
    <feOffset dy="1"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="300" height="400" fill="url(#rbgrad140)"/>
<ellipse cx="150" cy="340" rx="55" ry="8" fill="#ef4444" opacity="0.04"/>

<g filter="url(#bshadowrad140)">
  <!-- Cap -->
  <rect x="127" y="82" width="46" height="28" rx="6" fill="url(#bcaprad140)"/>
  <rect x="130" y="78" width="40" height="8" rx="4" fill="#333"/>
  <!-- Cap ridges -->
  <line x1="129" y1="84" x2="129" y2="108" stroke="white" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="132.5" y1="84" x2="132.5" y2="108" stroke="white" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="136" y1="84" x2="136" y2="108" stroke="white" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="139.5" y1="84" x2="139.5" y2="108" stroke="white" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="143" y1="84" x2="143" y2="108" stroke="white" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="146.5" y1="84" x2="146.5" y2="108" stroke="white" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="150" y1="84" x2="150" y2="108" stroke="white" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="153.5" y1="84" x2="153.5" y2="108" stroke="white" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="157" y1="84" x2="157" y2="108" stroke="white" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="160.5" y1="84" x2="160.5" y2="108" stroke="white" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="164" y1="84" x2="164" y2="108" stroke="white" stroke-opacity="0.06" stroke-width="0.4"/>
  <line x1="167.5" y1="84" x2="167.5" y2="108" stroke="white" stroke-opacity="0.06" stroke-width="0.4"/>
  <rect x="130" y="78" width="40" height="3" rx="1.5" fill="white" opacity="0.08"/>
  
  <!-- Neck -->
  <rect x="132" y="108" width="36" height="10" rx="2" fill="#2a2a2a" stroke="#333" stroke-width="0.5"/>
  
  <!-- Bottle body -->
  <rect x="112" y="116" width="76" height="185" rx="8" fill="url(#botrad140)" stroke="#444" stroke-width="0.5"/>
  <rect x="112" y="116" width="76" height="185" rx="8" fill="url(#bshinerad140)"/>
  
  <!-- Label -->
  <g filter="url(#bishadowrad140)">
    <rect x="116" y="148" width="68" height="115" rx="3" fill="url(#blblrad140)"/>
    <rect x="116" y="148" width="68" height="3" rx="1" fill="#ef4444"/>
    
    <text x="150" y="170" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="8.5" font-weight="900" fill="#111" letter-spacing="3">818 LABS</text>
    <line x1="126" y1="176" x2="174" y2="176" stroke="#b91c1c" stroke-width="0.8" stroke-opacity="0.6"/>
    
    <text x="150" y="192" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="800" fill="#b91c1c">RAD-140</text>
    
    <text x="150" y="225" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="7" font-weight="600" fill="#666">CAPSULES</text>
    
    <rect x="130" y="236" width="40" height="12" rx="6" fill="#b91c1c"/>
    <text x="150" y="244.5" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="6.5" font-weight="700" fill="white">>99% PURE</text>
    
    <text x="150" y="259" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="4" font-weight="500" fill="#999" letter-spacing="0.8">FOR RESEARCH USE ONLY</text>
  </g>
  
  <!-- Edge highlight -->
  <rect x="114" y="120" width="2" height="175" rx="1" fill="white" opacity="0.06"/>
</g>
</svg>